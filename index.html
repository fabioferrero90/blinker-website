    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Blinker è gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sì, scaricare e usare Blinker è completamente gratuito. Puoi cercare eventi, candidarti, gestire la tua crew e pubblicare il tuo garage senza costi nascosti."
          }
        },
        {
          "@type": "Question",
          "name": "Come trovo car meet vicino a me?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Apri la mappa eventi: vedrai car meet, raduni e track day nella tua zona. Filtra per tipologia (raduno serale, track day, monomarca, road tour) e per distanza per trovare subito quello che cerchi."
          }
        },
        {
          "@type": "Question",
          "name": "Posso organizzare un mio evento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Certo. Crea l'evento direttamente dall'app: data, luogo, categoria (raduno, track day, monomarca, ritrovo serale…) e tipologia di veicoli accettati. Puoi gestire le candidature, comunicare con i partecipanti e analizzare le statistiche dell'evento."
          }
        },
        {
          "@type": "Question",
          "name": "Come funzionano le selezioni e le candidature?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Per gli eventi a ingresso su selezione, gli utenti candidano uno dei veicoli del proprio garage virtuale e l'organizzatore approva, rifiuta o mette in lista d'attesa direttamente in app. Niente moduli Google, gruppi WhatsApp o strumenti esterni: tutto il flusso di selezione resta dentro Blinker."
          }
        },
        {
          "@type": "Question",
          "name": "Su quali dispositivi funziona Blinker?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Blinker è un'app nativa per iOS (App Store) e Android (Google Play), ed è anche accessibile da qualsiasi browser su blinker-app.com — così puoi gestire eventi e crew anche da desktop, senza installare nulla."
          }
        },
        {
          "@type": "Question",
          "name": "Devo creare un account per usare Blinker?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sì, l'accesso ai contenuti richiede un account gratuito. È una scelta voluta: ci teniamo alla privacy della community, e chi pubblica un evento sa esattamente chi può vederlo e candidarsi. La registrazione richiede pochi secondi."
          }
        },
        {
          "@type": "Question",
          "name": "Cos'è una crew?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Una crew è un gruppo di appassionati che partecipano insieme agli eventi. Puoi unirti a una crew esistente o crearne una per il tuo club, forum o gruppo di amici."
          }
        },
        {
          "@type": "Question",
          "name": "Blinker funziona anche fuori dall'Italia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sì, l'app è disponibile in 5 lingue (italiano, inglese, spagnolo, francese, tedesco) e mostra eventi pubblicati ovunque. La community più attiva al momento è in Italia ed Europa."
          }
        },
        {
          "@type": "Question",
          "name": "Come trattate i dati personali?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nel pieno rispetto del GDPR. Non vendiamo i tuoi dati e raccogliamo solo quanto serve a far funzionare l'app. Tutti i dettagli nella Privacy Policy."
          }
        }
      ]
    }
    </script>
